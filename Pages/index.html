<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UntitledWebsite</title>

  <!-- Google Font (flowery style) -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('../Images/bg.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    /* soft dark overlay to reduce harshness */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(3px);
      z-index: -1;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2.5rem;
      margin-top: 40px;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    .overlay {
      margin-top: 40px;
      width: 90%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .bubble {
      background: #d8f3dc;
      border-radius: 50px;
      padding: 20px;
      text-align: center;
      font-size: 1.2rem;
      color: #1b4332;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards;
    }

    .bubble:nth-child(1) { animation-delay: 0.5s; }
    .bubble:nth-child(2) { animation-delay: 0.8s; }
    .bubble:nth-child(3) { animation-delay: 1.1s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <h1>UntitledWebsite</h1>

  <div class="overlay">
    <div class="container">
      <div class="bubble">Stock</div>
      <div class="bubble" onclick="location.href='Scanner.html'" style="cursor:pointer;">Barcode Scanner</div>
      <div class="bubble">Socials</div>
    </div>
  </div>

</body>
</html>
